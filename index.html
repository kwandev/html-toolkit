<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>toolkit — single-file tools</title>
    <meta
      name="description"
      content="Small, fast, single-file tools for web, design, development, and everyday tasks. No sign-up, runs in your browser."
    />
    <style>
      /* 공유 디자인 시스템 */
      :root {
        color-scheme: light dark;

        /* palette — "precision workbench": cool paper, ink, one cobalt accent */
        --bg: #f6f7f9;
        --surface: #ffffff;
        --surface-2: #eff2f5;
        --ink: #14161a;
        --muted: #5b626e;
        --line: #e3e7ec;
        --accent: oklch(0.55 0.21 264);
        --accent-2: oklch(0.55 0.21 264 / 0.12);
        --on-accent: #ffffff;

        /* type */
        --font-sans: system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        --font-mono:
          ui-monospace, "SF Mono", "JetBrains Mono", "Cascadia Code", Menlo, Consolas, monospace;

        /* shape & scale */
        --radius: 10px;
        --radius-sm: 7px;
        --maxw: 1280px;
        --pad: clamp(16px, 4vw, 32px);
      }

      @media (prefers-color-scheme: dark) {
        :root:not([data-theme]) {
          --bg: #0b0d11;
          --surface: #1b2029;
          --surface-2: #242b36;
          --ink: #e9ebf0;
          --muted: #9aa2b1;
          --line: #3a4350;
          --accent: oklch(0.72 0.17 264);
          --accent-2: oklch(0.72 0.17 264 / 0.16);
          --on-accent: #0d0f13;
        }
      }

      /* explicit theme choice (set by shared.js) beats the media query above */
      :root[data-theme="light"] {
        color-scheme: light;
      }
      :root[data-theme="dark"] {
        color-scheme: dark;
        --bg: #0b0d11;
        --surface: #1b2029;
        --surface-2: #242b36;
        --ink: #e9ebf0;
        --muted: #9aa2b1;
        --line: #3a4350;
        --accent: oklch(0.72 0.17 264);
        --accent-2: oklch(0.72 0.17 264 / 0.16);
        --on-accent: #0d0f13;
      }

      * {
        box-sizing: border-box;
      }
      html {
        -webkit-text-size-adjust: 100%;
      }
      body {
        margin: 0;
        background: var(--bg);
        color: var(--ink);
        font-family: var(--font-sans);
        font-size: 16px;
        line-height: 1.55;
        -webkit-font-smoothing: antialiased;
      }
      a {
        color: inherit;
      }

      /* --- reusable components shared across every tool --- */
      .panel {
        background: var(--surface);
        border: 1px solid var(--line);
        border-radius: var(--radius);
        padding: clamp(16px, 3vw, 24px);
      }

      .btn {
        font: inherit;
        font-weight: 560;
        display: inline-flex;
        align-items: center;
        gap: 0.5ch;
        padding: 0.6em 1.1em;
        border-radius: var(--radius-sm);
        border: 1px solid var(--line);
        background: var(--surface);
        color: var(--ink);
        cursor: pointer;
        transition:
          border-color 0.15s,
          background 0.15s,
          transform 0.05s;
      }
      .btn:hover {
        border-color: var(--accent);
      }
      .btn:active {
        transform: translateY(1px);
      }
      .btn--accent {
        background: var(--accent);
        color: var(--on-accent);
        border-color: transparent;
      }

      .field {
        display: grid;
        gap: 6px;
      }
      .field > label {
        font-family: var(--font-mono);
        font-size: 0.78rem;
        color: var(--muted);
        display: flex;
        justify-content: space-between;
      }

      input[type="range"] {
        width: 100%;
        accent-color: var(--accent);
      }
      input[type="color"] {
        width: 100%;
        height: 36px;
        padding: 0;
        border: 1px solid var(--line);
        border-radius: var(--radius-sm);
        background: var(--surface);
        cursor: pointer;
      }

      code,
      .mono {
        font-family: var(--font-mono);
      }

      :focus-visible {
        outline: 2px solid var(--accent);
        outline-offset: 2px;
        border-radius: 3px;
      }

      /* free smooth page-to-page transition on supporting browsers (MPA, no JS) */
      @view-transition {
        navigation: auto;
      }

      @media (prefers-reduced-motion: reduce) {
        *,
        *::before,
        *::after {
          animation-duration: 0.001ms !important;
          transition-duration: 0.001ms !important;
        }
      }
    </style>
    <style>
      .eyebrow {
        font-family: var(--font-mono);
        font-size: 0.72rem;
        letter-spacing: 0.02em;
        color: var(--muted);
      }
      .hero {
        margin-bottom: 36px;
      }
      .hero h1 {
        font-size: clamp(1.8rem, 5vw, 2.8rem);
        letter-spacing: -0.03em;
        margin: 10px 0 12px;
        max-width: 18ch;
      }
      .hero p {
        color: var(--muted);
        max-width: 54ch;
        margin: 0;
        font-size: 1.05rem;
      }

      .grid {
        display: grid;
        gap: 14px;
        grid-template-columns: repeat(auto-fill, minmax(248px, 1fr));
      }
      .card {
        display: block;
        text-decoration: none;
        color: inherit;
        background: var(--surface);
        border: 1px solid var(--line);
        border-radius: var(--radius);
        padding: 18px 18px 16px;
        transition:
          border-color 0.15s,
          transform 0.12s,
          box-shadow 0.15s;
      }
      .card:hover {
        border-color: var(--accent);
        transform: translateY(-2px);
        box-shadow: 0 8px 24px -16px var(--accent);
      }
      .card .tag {
        font-family: var(--font-mono);
        font-size: 0.7rem;
        color: var(--accent);
      }
      .card h3 {
        margin: 8px 0 6px;
        font-size: 1.05rem;
        letter-spacing: -0.01em;
      }
      .card p {
        margin: 0;
        color: var(--muted);
        font-size: 0.9rem;
        line-height: 1.45;
      }
      .card .go {
        margin-top: 12px;
        font-family: var(--font-mono);
        font-size: 0.78rem;
        color: var(--muted);
      }
      .card:hover .go {
        color: var(--accent);
      }
    </style>
  </head>
  <body>
    <app-shell>
      <section class="hero">
        <div class="eyebrow">// open-source utilities</div>
        <h1>Single-file tools for work, design, and everyday life.</h1>
        <p>
          No sign-up, no upload, no server. Each tool is one HTML file that runs entirely in your
          browser.
        </p>
      </section>
      <div id="grid" class="grid" aria-label="Tools"></div>
    </app-shell>

    <script src="app/shared.js"></script>
    <script>
      document.getElementById("grid").innerHTML = window.TOOLS.map(
        (t) => `
      <a class="card" href="${t.href}">
        <span class="tag">${t.tag}</span>
        <h3>${t.name}</h3>
        <p>${t.blurb}</p>
        <div class="go">open &rarr;</div>
      </a>`,
      ).join("");
    </script>
  </body>
</html>
